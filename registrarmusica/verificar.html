<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificar Certificado</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body{ background:#050505; }
    .glass{
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,0.08);
    }
  </style>
</head>

<body class="text-white min-h-screen px-6 py-16">

  <div class="max-w-4xl mx-auto">

    <div class="text-center">
      <h1 class="text-5xl font-bold">Verificar Certificado</h1>
      <p class="mt-4 text-gray-400 text-lg">
        Consulte a autenticidade de um registro pelo protocolo.
      </p>
    </div>

    <div class="glass rounded-[40px] p-10 mt-12">

      <label class="block mb-3 text-gray-300">Protocolo</label>

      <input
        id="protocolo"
        type="text"
        placeholder="Ex: RM-1778182123147"
        class="w-full bg-black/40 border border-white/10 rounded-2xl px-5 py-4"
      >

      <button
        onclick="verificarRegistro()"
        class="mt-6 w-full bg-green-500 hover:bg-green-400 transition text-black font-bold py-5 rounded-2xl text-lg"
      >
        Verificar
      </button>

      <div id="resultado" class="mt-10 hidden glass rounded-3xl p-8"></div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = 'https://bdtswwyctsesszfyicoz.supabase.co'

    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdHN3d3ljdHNlc3N6ZnlpY296Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNTg4NDksImV4cCI6MjA5MzczNDg0OX0.MDB0cZsOq4EhsoJDrkistbB9Xy12DS_oxpjqDpiE-BA'

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

    let registroAtual = null

    async function imagemParaBase64(url){
      const response = await fetch(url)
      const blob = await response.blob()

      return new Promise((resolve) => {
        const reader = new FileReader()
        reader.onloadend = () => resolve(reader.result)
        reader.readAsDataURL(blob)
      })
    }

    async function baixarCertificado(){
      const { jsPDF } = window.jspdf

      const doc = new jsPDF({
        orientation: 'landscape',
        unit: 'mm',
        format: 'a4'
      })

      const data = registroAtual

      const largura = 297
      const altura = 210

      const dourado = [176, 132, 46]
      const douradoClaro = [218, 180, 92]
      const preto = [28, 24, 20]
      const creme = [248, 243, 230]
      const marrom = [92, 63, 28]

      doc.setFillColor(creme[0], creme[1], creme[2])
      doc.rect(0, 0, largura, altura, 'F')

      doc.setDrawColor(dourado[0], dourado[1], dourado[2])
      doc.setLineWidth(2)
      doc.rect(10, 10, largura - 20, altura - 20)

      doc.setLineWidth(0.5)
      doc.rect(15, 15, largura - 30, altura - 30)

      doc.setDrawColor(douradoClaro[0], douradoClaro[1], douradoClaro[2])
      doc.setLineWidth(0.3)
      doc.line(25, 34, 272, 34)
      doc.line(25, 176, 272, 176)

      try{
        const logo = await imagemParaBase64('logo-registrar-agora.png')
        doc.addImage(logo, 'PNG', 108, 18, 82, 38)
      }catch(e){
        doc.setTextColor(dourado[0], dourado[1], dourado[2])
        doc.setFontSize(18)
        doc.text('REGISTRAR AGORA', 148.5, 35, { align: 'center' })
      }

      doc.setTextColor(preto[0], preto[1], preto[2])
      doc.setFont('times', 'bold')
      doc.setFontSize(26)
      doc.text('CERTIFICADO DE REGISTRO AUTORAL', 148.5, 68, { align: 'center' })

      doc.setFont('times', 'normal')
      doc.setFontSize(11)
      doc.setTextColor(marrom[0], marrom[1], marrom[2])
      doc.text('Prova digital de anterioridade autoral com validação pública por protocolo, hash criptográfico e QR Code.', 148.5, 76, { align: 'center' })

      doc.setDrawColor(dourado[0], dourado[1], dourado[2])
      doc.setLineWidth(0.4)
      doc.line(55, 82, 242, 82)

      doc.setFillColor(255, 252, 242)
      doc.roundedRect(25, 92, 166, 65, 3, 3, 'F')
      doc.setDrawColor(220, 190, 120)
      doc.roundedRect(25, 92, 166, 65, 3, 3, 'S')

      doc.setTextColor(preto[0], preto[1], preto[2])
      doc.setFont('times', 'bold')
      doc.setFontSize(11)

      doc.text('PROTOCOLO:', 34, 104)
      doc.text('AUTOR:', 34, 115)
      doc.text('NOME ARTÍSTICO:', 34, 126)
      doc.text('TÍTULO DA OBRA:', 34, 137)
      doc.text('TIPO:', 34, 148)

      doc.setFont('times', 'normal')
      doc.text(data.protocolo, 78, 104)
      doc.text(data.nome || '-', 78, 115)
      doc.text(data.nome_artistico || '-', 78, 126)
      doc.text(data.titulo || '-', 78, 137)
      doc.text(data.tipo || '-', 78, 148)

      doc.setFillColor(34, 120, 70)
      doc.roundedRect(200, 92, 72, 17, 3, 3, 'F')
      doc.setTextColor(255, 255, 255)
      doc.setFont('helvetica', 'bold')
      doc.setFontSize(10)
      doc.text('PAGAMENTO CONFIRMADO', 236, 103, { align: 'center' })

      const linkValidacao =
        `${window.location.origin}/verificar.html?protocolo=${data.protocolo}`

      try{
        const qrUrl =
          'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' +
          encodeURIComponent(linkValidacao)

        const qrBase64 = await imagemParaBase64(qrUrl)

        doc.setFillColor(255, 255, 255)
        doc.roundedRect(211, 116, 50, 50, 2, 2, 'F')
        doc.addImage(qrBase64, 'PNG', 215, 120, 42, 42)

        doc.setTextColor(marrom[0], marrom[1], marrom[2])
        doc.setFont('helvetica', 'normal')
        doc.setFontSize(7)
        doc.text('Escaneie para validar', 236, 170, { align: 'center' })
      }catch(e){
        doc.setTextColor(marrom[0], marrom[1], marrom[2])
        doc.setFontSize(8)
        doc.text('QR Code indisponível', 236, 140, { align: 'center' })
      }

      doc.setTextColor(preto[0], preto[1], preto[2])
      doc.setFont('times', 'bold')
      doc.setFontSize(10)
      doc.text('HASH SHA-256', 25, 172)

      doc.setFont('courier', 'normal')
      doc.setFontSize(7)
      doc.setTextColor(70, 70, 70)
      doc.text(doc.splitTextToSize(data.hash_sha256 || '-', 170), 25, 179)

      doc.setTextColor(marrom[0], marrom[1], marrom[2])
      doc.setFont('times', 'normal')
      doc.setFontSize(9)

      const textoLegal =
        'Certificamos que a obra informada foi submetida à plataforma Registrar Agora, gerando protocolo único, data de registro e hash criptográfico para comprovação digital de anterioridade.'

      doc.text(doc.splitTextToSize(textoLegal, 185), 25, 192)

      doc.setFont('times', 'bold')
      doc.setFontSize(10)
      doc.setTextColor(dourado[0], dourado[1], dourado[2])
      doc.text('REGISTRAR AGORA', 236, 186, { align: 'center' })

      doc.setFont('times', 'normal')
      doc.setFontSize(8)
      doc.setTextColor(marrom[0], marrom[1], marrom[2])
      doc.text('Registro Autoral Digital', 236, 192, { align: 'center' })

      doc.setFontSize(7)
      doc.text('Operado por Atual Records Produções • MEI', 236, 198, { align: 'center' })
      doc.text('CNPJ: 33.705.089/0001-40', 236, 202, { align: 'center' })
      doc.text('Responsável: Eval da Silva Arantes', 236, 206, { align: 'center' })

      doc.setFont('helvetica', 'normal')
      doc.setFontSize(6.5)
      doc.setTextColor(90, 90, 90)
      doc.text(`Validação pública: ${linkValidacao}`, 148.5, 187, { align: 'center' })

      doc.save(`certificado-${data.protocolo}.pdf`)
    }

    async function verificarRegistro(protocoloManual = null){

      const protocolo =
        protocoloManual ||
        document.getElementById('protocolo').value.trim()

      const resultado = document.getElementById('resultado')

      if(!protocolo){
        alert('Digite um protocolo')
        return
      }

      document.getElementById('protocolo').value = protocolo

      const { data, error } = await supabaseClient
        .from('registros')
        .select('*')
        .eq('protocolo', protocolo)
        .single()

      if(error || !data){
        resultado.classList.remove('hidden')
        resultado.innerHTML = `
          <h2 class="text-2xl font-bold text-red-400">Registro não encontrado</h2>
          <p class="mt-4 text-gray-400">Verifique se o protocolo foi digitado corretamente.</p>
        `
        return
      }

      registroAtual = data

      const respostaPagamento = await fetch(
        '/.netlify/functions/verificar-pagamento?protocolo=' + protocolo
      )

      const pagamento = await respostaPagamento.json()
      const statusPagamento = pagamento.status || 'PENDING'

      const pagamentoTexto =
        statusPagamento === 'PAID'
          ? 'Pagamento aprovado'
          : 'Aguardando pagamento'

      const pagamentoClasse =
        statusPagamento === 'PAID'
          ? 'text-green-400'
          : 'text-yellow-400'

      const botaoCertificado =
        statusPagamento === 'PAID'
          ? `
            <button
              onclick="baixarCertificado()"
              class="mt-8 bg-green-500 hover:bg-green-400 text-black font-bold px-8 py-4 rounded-2xl"
            >
              Baixar Certificado PDF
            </button>
          `
          : `
            <p class="mt-8 text-yellow-400 font-semibold">
              O certificado será liberado após a confirmação do pagamento.
            </p>
          `

      resultado.classList.remove('hidden')

      resultado.innerHTML = `
        <div class="flex items-center gap-3">
          <div class="w-4 h-4 rounded-full bg-green-400"></div>
          <h2 class="text-3xl font-bold text-green-400">Registro encontrado</h2>
        </div>

        <div class="mt-8 space-y-4 text-gray-300">
          <p><strong>Protocolo:</strong> ${data.protocolo}</p>
          <p><strong>Autor:</strong> ${data.nome}</p>
          <p><strong>Nome artístico:</strong> ${data.nome_artistico || '-'}</p>
          <p><strong>Título da obra:</strong> ${data.titulo}</p>
          <p><strong>Tipo:</strong> ${data.tipo}</p>

          <p>
            <strong>Status do pagamento:</strong>
            <span class="${pagamentoClasse} font-bold">${pagamentoTexto}</span>
          </p>

          <p><strong>Data do registro:</strong> ${new Date(data.criado_em).toLocaleString('pt-BR')}</p>

          <div class="pt-6 border-t border-white/10">
            <p class="font-semibold mb-2">Hash SHA-256</p>
            <p class="break-all text-sm text-green-300">${data.hash_sha256}</p>
          </div>

          ${botaoCertificado}
        </div>
      `
    }

    const params = new URLSearchParams(window.location.search)
    const protocoloURL = params.get('protocolo')

    if(protocoloURL){
      verificarRegistro(protocoloURL)
    }
  </script>

</body>
</html>
